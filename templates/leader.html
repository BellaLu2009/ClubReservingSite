<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社长管理后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .container {
            max-width: 960px;
        }
        .card-header {
            background-color: #007bff;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <h1 class="mb-4">社长管理后台</h1>

        <!-- Section for Club Information -->
        <div class="card mb-4">
            <div class="card-header">
                社团信息管理
            </div>
            <div class="card-body">
                <p>在这里，您可以编辑您社团的详细信息。</p>
                <!-- Add club editing form here -->
            </div>
        </div>

        <!-- Section for Photo Album -->
        <div class="card mb-4">
            <div class="card-header">
                社团相册管理
            </div>
            <div class="card-body">
                <p>在这里，您可以上传和管理社团的活动照片。</p>
                <!-- Add photo upload form and gallery here -->
            </div>
        </div>

        <!-- Section for Member Check-in -->
        <div class="card">
            <div class="card-header">
                成员签到管理
            </div>
            <div class="card-body">
                <p>在这里，您可以为活动生成签到码，并查看成员签到情况。</p>
                <!-- Add check-in management tools here -->
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
