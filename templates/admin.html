<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理系统</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='0.9em' font-size='90'%3E🛠️%3C/text%3E%3C/svg%3E">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://unpkg.com/vue@3"></script>
    <style>
        :root {
            --bs-primary: #5a9bfc;
            --bs-primary-rgb: 90, 155, 252;
            --bs-danger: #f56c6c;
            --bs-body-bg: #f9f9f9;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bs-body-bg);
        }
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            width: 260px;
            padding: 20px;
            background-color: #fff;
            border-right: 1px solid #eee;
            display: flex;
            flex-direction: column;
        }
        .main-content {
            margin-left: 280px;
            padding: 30px;
        }
        .sidebar-header {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 2rem;
            color: #333;
        }
        .nav-link {
            font-size: 1.05rem;
            color: #555;
            border-radius: 0.375rem;
            margin-bottom: 0.5rem;
        }
        .nav-link.active {
            background-color: var(--bs-primary);
            color: #fff;
        }
        .nav-link:hover {
            background-color: #f0f0f0;
        }
        .nav-link.active:hover {
            background-color: #4a8afc;
        }
        .sidebar-footer {
            margin-top: auto;
        }
        .card {
            border: 1px solid #eee;
        }
        .card-header {
            background-color: #fff;
        }
        .btn-primary {
            background-color: var(--bs-primary);
            border-color: var(--bs-primary);
        }
        .btn-primary:hover {
            background-color: #4a8afc;
            border-color: #4a8afc;
        }
        .btn-outline-primary {
            color: var(--bs-primary);
            border-color: var(--bs-primary);
        }
        .btn-outline-primary:hover {
            background-color: var(--bs-primary);
            border-color: var(--bs-primary);
            color: #fff;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--bs-primary);
            box-shadow: 0 0 0 0.25rem rgba(var(--bs-primary-rgb), 0.25);
        }
        .form-check-input:checked {
            background-color: var(--bs-primary);
            border-color: var(--bs-primary);
        }
    </style>
</head>
<body>
<div id="admin-app">
{% raw %}
    <div class="sidebar">
        <div>
            <h1 class="sidebar-header">管理后台</h1>
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link" :class="{ active: activeView === 'clubs' }" href="#" @click.prevent="activeView = 'clubs'">
                        <i class="bi bi-collection-fill me-2"></i> 社团管理
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" :class="{ active: activeView === 'users' }" href="#" @click.prevent="activeView = 'users'">
                        <i class="bi bi-people-fill me-2"></i> 用户管理
                    </a>
                </li>
            </ul>
        </div>
        <div class="sidebar-footer">
            <a class="nav-link" href="#" @click.prevent="logout">
                <i class="bi bi-box-arrow-left me-2"></i> 切换账号
            </a>
        </div>
    </div>

    <main class="main-content">
        <!-- 社团管理视图 -->
        <div v-if="activeView === 'clubs'">
            <!-- ... existing club management code ... -->
        </div>

        <!-- 用户管理视图 -->
        <div v-if="activeView === 'users'">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>用户管理</h2>
            </div>
            <div class="card">
                <div class="card-body">
                    <table class="table table-hover align-middle">
                        <thead>
                            <tr>
                                <th>用户ID</th>
                                <th>用户名</th>
                                <th>姓名</th>
                                <th>角色</th>
                                <th class="text-end">操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr v-for="user in users" :key="user.user_id">
                                <td>{{ user.user_id }}</td>
                                <td>{{ user.username }}</td>
                                <td>{{ user.name }}</td>
                                <td>
                                    <span v-for="role in parsedRoles(user.roles)" :key="role" class="badge me-1" :class="roleClass(role)">
                                        {{ role }}
                                    </span>
                                </td>
                                <td class="text-end">
                                    <button class="btn btn-sm btn-outline-primary me-2" @click="openUserModal(user)">编辑</button>
                                    <button class="btn btn-sm btn-outline-danger" @click="deleteUser(user.user_id)">删除</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- 用户编辑 Modal -->
    <div class="modal fade" id="userModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">编辑用户: {{ editableUser.username }}</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">角色</label>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="STUDENT" v-model="editableUser.roles">
                            <label class="form-check-label">STUDENT</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="CLUB_LEADER" v-model="editableUser.roles">
                            <label class="form-check-label">CLUB_LEADER</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="ADMIN" v-model="editableUser.roles">
                            <label class="form-check-label">ADMIN</label>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                    <button type="button" class="btn btn-primary" @click="saveUser">保存更改</button>
                </div>
            </div>
        </div>
    </div>
{% endraw %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const { createApp, ref, onMounted, watch } = Vue;

    createApp({
        setup() {
            const API_BASE_URL = '/api';
            const activeView = ref('clubs');
            const clubs = ref([]);
            const users = ref([]);
            const editableUser = ref({});
            let userModal = null;

            const apiRequest = async (endpoint, method = 'GET', body = null) => {
                const options = {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                };
                if (body) options.body = JSON.stringify(body);
                const response = await fetch(API_BASE_URL + endpoint, options);
                if (response.status === 401) {
                    window.location.href = '/';
                    return;
                }
                const data = await response.json();
                if (!response.ok) throw new Error(data.error || '请求失败');
                return data;
            };

            const fetchClubs = async () => {
                try {
                    clubs.value = await apiRequest('/clubs');
                } catch (error) {
                    console.error("获取社团列表失败:", error);
                    alert("获取社团列表失败!");
                }
            };

            const fetchUsers = async () => {
                try {
                    users.value = await apiRequest('/admin/users');
                } catch (error) {
                    console.error("获取用户列表失败:", error);
                    alert("获取用户列表失败!");
                }
            };

            const openUserModal = (user) => {
                editableUser.value = { ...user, roles: parsedRoles(user.roles) };
                userModal.show();
            };

            const saveUser = async () => {
                try {
                    await apiRequest(`/admin/user/${editableUser.value.user_id}`, 'PUT', { roles: editableUser.value.roles });
                    userModal.hide();
                    await fetchUsers();
                } catch (error) {
                    alert('保存用户失败: ' + error.message);
                }
            };

            const deleteUser = async (userId) => {
                if (confirm(`确定要删除 ID 为 ${userId} 的用户吗？`)) {
                    try {
                        await apiRequest(`/admin/user/${userId}`, 'DELETE');
                        await fetchUsers();
                    } catch (error) {
                        alert('删除用户失败: ' + error.message);
                    }
                }
            };

            const logout = async () => {
                try {
                    await apiRequest('/logout', 'POST');
                    window.location.href = '/';
                } catch (error) {
                    alert('退出失败，请重试。');
                }
            };

            const parsedRoles = (rolesStr) => {
                try {
                    return JSON.parse(rolesStr);
                } catch (e) {
                    return [];
                }
            };

            const roleClass = (role) => {
                switch (role) {
                    case 'ADMIN': return 'bg-danger';
                    case 'CLUB_LEADER': return 'bg-primary';
                    case 'STUDENT': return 'bg-secondary';
                    default: return 'bg-light text-dark';
                }
            };

            onMounted(() => {
                fetchClubs();
                userModal = new bootstrap.Modal(document.getElementById('userModal'));
                watch(activeView, (newView) => {
                    if (newView === 'users') {
                        fetchUsers();
                    }
                });
            });

            return {
                activeView,
                clubs,
                users,
                editableUser,
                openUserModal,
                saveUser,
                deleteUser,
                logout,
                parsedRoles,
                roleClass,
            };
        }
    }).mount('#admin-app');
</script>
</body>
</html>
