<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社长管理后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .container {
            max-width: 960px;
        }
        .card-header {
            background-color: #007bff;
            color: white;
        }
        .photo-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1rem;
        }
        .photo-item img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 0.25rem;
        }
        .check-in-code {
            font-size: 2rem;
            font-weight: bold;
            color: #dc3545;
            text-align: center;
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>社长管理后台</h1>
            <a href="/api/logout" class="btn btn-secondary">退出登录</a>
        </div>

        <!-- Section for Club Information -->
        <div class="card mb-4">
            <div class="card-header">
                社团信息管理
            </div>
            <div class="card-body">
                <form id="club-info-form">
                    <div class="mb-3">
                        <label for="club-name" class="form-label">社团名称</label>
                        <input type="text" class="form-control" id="club-name" disabled>
                    </div>
                    <div class="mb-3">
                        <label for="club-description" class="form-label">社团描述</label>
                        <textarea class="form-control" id="club-description" rows="3"></textarea>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="club-category" class="form-label">社团类别</label>
                            <input type="text" class="form-control" id="club-category">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="club-location" class="form-label">活动地点</label>
                            <input type="text" class="form-control" id="club-location">
                        </div>
                    </div>
                     <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="club-day" class="form-label">活动日 (0=周日, 1=周一...)</label>
                            <input type="number" class="form-control" id="club-day">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="club-capacity" class="form-label">最大容量</label>
                            <input type="number" class="form-control" id="club-capacity">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="club-start-time" class="form-label">开始时间</label>
                            <input type="time" class="form-control" id="club-start-time">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="club-end-time" class="form-label">结束时间</label>
                            <input type="time" class="form-control" id="club-end-time">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">保存更改</button>
                </form>
            </div>
        </div>

        <!-- Section for Photo Album -->
        <div class="card mb-4">
            <div class="card-header">
                社团相册管理
            </div>
            <div class="card-body">
                <form id="photo-upload-form" class="mb-4">
                    <div class="mb-3">
                        <label for="photo-file" class="form-label">上传新照片</label>
                        <input class="form-control" type="file" id="photo-file" accept="image/*" required>
                    </div>
                    <div class="mb-3">
                        <label for="photo-caption" class="form-label">照片说明 (可选)</label>
                        <input type="text" class="form-control" id="photo-caption" placeholder="例如：迎新活动合影">
                    </div>
                    <button type="submit" class="btn btn-success">上传照片</button>
                </form>
                <hr>
                <h5>已上传的照片</h5>
                <div id="photo-gallery" class="photo-gallery mt-3">
                    <!-- Photos will be loaded here -->
                </div>
            </div>
        </div>

        <!-- Section for Member Check-in -->
        <div class="card">
            <div class="card-header">
                成员签到管理
            </div>
            <div class="card-body">
                <button id="generate-check-in" class="btn btn-info mb-3">为本次活动生成签到码</button>
                <div id="check-in-display" class="text-center" style="display: none;">
                    <p>请成员在15分钟内使用以下签到码完成签到：</p>
                    <p id="check-in-code" class="check-in-code">------</p>
                    <p id="check-in-expires" class="text-muted"></p>
                    <button id="view-attendance" class="btn btn-sm btn-outline-primary">查看签到情况</button>
                </div>
                 <div id="attendance-list" class="mt-3" style="display: none;">
                    <h5>签到列表</h5>
                    <ul class="list-group">
                        <!-- Attendance will be shown here -->
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            let currentClub = null;
            let currentEvent = null;

            Promise.all([
                fetch('/api/session').then(res => res.json()),
                fetch('/api/clubs').then(res => res.json())
            ])
            .then(([user, clubs]) => {
                if (!user || !user.roles.includes('CLUB_LEADER')) {
                    alert('您没有社长权限，将返回首页。');
                    window.location.href = '/';
                    return;
                }

                currentClub = clubs.find(club => club.leader_id === user.user_id);

                if (currentClub) {
                    populateClubForm(currentClub);
                    loadClubPhotos(currentClub.club_id);
                } else {
                    alert('您当前没有管理的社团。');
                    document.getElementById('club-info-form').style.display = 'none';
                    document.getElementById('photo-upload-form').style.display = 'none';
                    document.querySelector('.card.mb-4 .card-header').textContent = '无管理的社团';
                }
            })
            .catch(error => {
                console.error('Error loading leader data:', error);
                alert('加载页面数据时出错，请刷新重试。');
            });

            function populateClubForm(club) {
                document.getElementById('club-name').value = club.name;
                document.getElementById('club-description').value = club.description;
                document.getElementById('club-category').value = club.category;
                document.getElementById('club-location').value = club.location;
                document.getElementById('club-day').value = club.day_of_week;
                document.getElementById('club-capacity').value = club.max_capacity;
                document.getElementById('club-start-time').value = club.start_time;
                document.getElementById('club-end-time').value = club.end_time;
            }

            // Handle club info form submission
            const clubForm = document.getElementById('club-info-form');
            clubForm.addEventListener('submit', function(event) {
                event.preventDefault();
                if (!currentClub) {
                    alert('没有找到您的社团信息，无法更新。');
                    return;
                }

                const updatedData = {
                    description: document.getElementById('club-description').value,
                    category: document.getElementById('club-category').value,
                    location: document.getElementById('club-location').value,
                    day_of_week: parseInt(document.getElementById('club-day').value, 10),
                    max_capacity: parseInt(document.getElementById('club-capacity').value, 10),
                    start_time: document.getElementById('club-start-time').value,
                    end_time: document.getElementById('club-end-time').value,
                };

                fetch('/api/leader/club', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(updatedData),
                })
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        alert('更新失败: ' + data.error);
                    } else {
                        alert('社团信息更新成功！');
                        populateClubForm(data); // Repopulate form with updated data
                    }
                })
                .catch(error => {
                    console.error('Error updating club info:', error);
                    alert('更新过程中发生错误。');
                });
            });

            // --- Photo Album Logic ---
            const photoUploadForm = document.getElementById('photo-upload-form');
            const photoGallery = document.getElementById('photo-gallery');

            function loadClubPhotos(clubId) {
                fetch(`/api/clubs/${clubId}/photos`)
                    .then(response => response.json())
                    .then(photos => {
                        photoGallery.innerHTML = ''; // Clear existing photos
                        photos.forEach(photo => {
                            const photoItem = document.createElement('div');
                            photoItem.className = 'photo-item';
                            photoItem.innerHTML = `
                                <img src="${photo.photo_url}" alt="${photo.caption || '社团照片'}">
                                <p class="text-muted small">${photo.caption || ''}</p>
                            `;
                            photoGallery.appendChild(photoItem);
                        });
                    });
            }

            photoUploadForm.addEventListener('submit', function(event) {
                event.preventDefault();
                if (!currentClub) {
                    alert('没有找到您的社团信息，无法上传照片。');
                    return;
                }

                const photoFile = document.getElementById('photo-file').files[0];
                const caption = document.getElementById('photo-caption').value;

                if (!photoFile) {
                    alert('请选择要上传的照片文件。');
                    return;
                }

                const formData = new FormData();
                formData.append('photo', photoFile);
                formData.append('caption', caption);

                fetch('/api/leader/club/photo', {
                    method: 'POST',
                    body: formData,
                })
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        alert('上传失败: ' + data.error);
                    } else {
                        alert('照片上传成功！');
                        loadClubPhotos(currentClub.club_id); // Refresh gallery
                        photoUploadForm.reset(); // Clear the form
                    }
                })
                .catch(error => {
                    console.error('Error uploading photo:', error);
                    alert('上传过程中发生错误。');
                });
            });

            // --- Check-in Logic ---
            const generateBtn = document.getElementById('generate-check-in');
            const checkInDisplay = document.getElementById('check-in-display');
            const checkInCodeP = document.getElementById('check-in-code');
            const checkInExpiresP = document.getElementById('check-in-expires');
            const viewAttendanceBtn = document.getElementById('view-attendance');
            const attendanceListDiv = document.getElementById('attendance-list');

            generateBtn.addEventListener('click', function() {
                if (!currentClub) {
                    alert('无法生成签到码，未找到社团信息。');
                    return;
                }

                fetch('/api/leader/club/event', { method: 'POST' })
                    .then(response => response.json())
                    .then(event => {
                        currentEvent = event;
                        checkInCodeP.textContent = event.check_in_code;
                        const expires = new Date(event.expires_at);
                        checkInExpiresP.textContent = `有效期至: ${expires.toLocaleTimeString()}`;
                        checkInDisplay.style.display = 'block';
                        attendanceListDiv.style.display = 'none'; // Hide previous list
                        attendanceListDiv.querySelector('.list-group').innerHTML = '';
                    })
                    .catch(err => alert('生成签到码失败。'));
            });

            viewAttendanceBtn.addEventListener('click', function() {
                if (!currentEvent) {
                    alert('请先生成一个签到事件。');
                    return;
                }

                fetch(`/api/leader/club/event/${currentEvent.event_id}/attendance`)
                    .then(response => response.json())
                    .then(attendees => {
                        const listGroup = attendanceListDiv.querySelector('.list-group');
                        listGroup.innerHTML = '';
                        if (attendees.length === 0) {
                            listGroup.innerHTML = '<li class="list-group-item">暂无签到记录</li>';
                        } else {
                            attendees.forEach(att => {
                                const item = document.createElement('li');
                                item.className = 'list-group-item';
                                const checkInTime = new Date(att.checked_in_at).toLocaleTimeString();
                                item.textContent = `${att.name} (${att.student_id || 'N/A'}) - ${att.class_name || 'N/A'} - 签到于: ${checkInTime}`;
                                listGroup.appendChild(item);
                            });
                        }
                        attendanceListDiv.style.display = 'block';
                    })
                    .catch(err => alert('获取签到列表失败。'));
            });
        });
    </script>
</body>
</html>
